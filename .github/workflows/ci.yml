name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.13"
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit
      # The data plane clones app dirs copy-on-write (APFS/XFS-reflink/btrfs);
      # GitHub's runners are ext4 with no reflink, so live-db snapshots and
      # preview data-branches fall back to a best-effort copy that can't be
      # crash-consistent. Give the tests a real reflink filesystem: an XFS
      # loopback mounted where they root their state ($HOME/.op-e2e + TMPDIR).
      - name: Copy-on-write scratch filesystem (XFS reflink)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq xfsprogs
          dd if=/dev/zero of=/tmp/cow.img bs=1M count=3072 status=none
          mkfs.xfs -m reflink=1 -q /tmp/cow.img
          mkdir -p "$HOME/.op-e2e"
          sudo mount -o loop /tmp/cow.img "$HOME/.op-e2e"
          sudo chown "$USER:$USER" "$HOME/.op-e2e"
          mkdir -p "$HOME/.op-e2e/tmp"
          echo "TMPDIR=$HOME/.op-e2e/tmp" >> "$GITHUB_ENV"
          # prove reflink is actually available
          echo hi > "$HOME/.op-e2e/a" && cp --reflink=always "$HOME/.op-e2e/a" "$HOME/.op-e2e/b" && echo "reflink OK"
      # Untimed cache warm: the M1 clock starts inside the test, not here.
      - run: docker pull -q oven/bun:1-alpine
      # Real Linux deployments run the daemon as root (it drives the Docker
      # socket). Snapshotting a *running* app means the host reads db files a
      # hardened, non-root (65534) container wrote — only root (or macOS's
      # Docker-Desktop uid mapping) can. Run the suite as root so the
      # live-container e2e tests mirror a real deploy instead of the runner's
      # unprivileged user.
      - name: unit + M1 full loop (soft 60s / hard 90s)
        run: sudo -E env HOME="$HOME" PATH="$PATH" TMPDIR="$TMPDIR" bun test
